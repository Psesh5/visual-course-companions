<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>18.06 — 3×3 System Explorer (row & column picture)</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
<style>
  body { font-family: -apple-system, Helvetica, Arial, sans-serif; margin: 18px; color:#1a1a1a; }
  h1 { font-size: 20px; margin: 0 0 4px; }
  .sub { color:#666; font-size:13px; margin-bottom:14px; }
  table.sys { border-collapse: collapse; margin-bottom: 10px; }
  table.sys td { padding: 2px 3px; }
  input.coef { width: 56px; text-align:right; font-size:15px; padding:3px; }
  .var { color:#777; font-weight:600; }
  button { font-size:14px; padding:7px 14px; margin-right:8px; cursor:pointer;
           border:1px solid #aaa; border-radius:6px; background:#f6f6f6; }
  button.primary { background:#1f77b4; color:#fff; border-color:#1f77b4; }
  #status { background:#f4f7fb; border:1px solid #d6e2f0; border-radius:8px;
            padding:10px 14px; margin:12px 0; font-size:14px; line-height:1.55; }
  #status code { background:#e8eef6; padding:1px 5px; border-radius:4px; }
  .plots { display:flex; flex-wrap:wrap; gap:10px; }
  .plot { flex:1 1 480px; min-width:380px; height:520px; border:1px solid #eee; border-radius:8px; }
  label.rng { font-size:13px; color:#444; margin-left:6px; }
  .tag { font-weight:700; }
  .tag.one { color:#176d2c; } .tag.none { color:#b00020; } .tag.inf { color:#9a6b00; }
</style>
</head>
<body>
  <h1>3×3 System Explorer — row picture &amp; column picture</h1>
  <div class="sub">Type any system <code>Ax = b</code>. Drag to rotate · scroll to zoom · hover for coordinates. (MIT 18.06, Lec 1–3)</div>

  <table class="sys" id="grid"></table>

  <div>
    <button class="primary" onclick="plotAll()">Plot</button>
    <button onclick="loadExample()">Lecture example</button>
    <label class="rng">axis range ±<input id="rng" class="coef" type="number" value="4" style="width:48px"></label>
  </div>

  <div id="status"></div>

  <div class="plots">
    <div id="rowPlot" class="plot"></div>
    <div id="colPlot" class="plot"></div>
  </div>

<script>
const EX_A = [[2,-1,0],[-1,2,-1],[0,-3,4]];
const EX_B = [0,-1,4];
const COLORS = ["Blues","Greens","Oranges"];
const VEC    = ["#1f77b4","#2ca02c","#ff7f0e"];

// ---------- build the input grid ----------
function buildGrid(){
  const t = document.getElementById("grid");
  let html = "";
  for(let i=0;i<3;i++){
    html += "<tr>";
    ["a","b","c"].forEach((_,j)=>{
      const v = EX_A[i][j];
      html += `<td><input class="coef" id="A${i}${j}" value="${v}"></td>`;
      html += `<td class="var">${["x","y","z"][j]}${j<2?" +":""}</td>`;
    });
    html += `<td class="var"> =</td><td><input class="coef" id="b${i}" value="${EX_B[i]}"></td>`;
    html += "</tr>";
  }
  t.innerHTML = html;
}
function loadExample(){
  for(let i=0;i<3;i++){ for(let j=0;j<3;j++) document.getElementById(`A${i}${j}`).value=EX_A[i][j];
    document.getElementById(`b${i}`).value=EX_B[i]; }
  plotAll();
}
function readSystem(){
  const A=[[0,0,0],[0,0,0],[0,0,0]], b=[0,0,0];
  for(let i=0;i<3;i++){ for(let j=0;j<3;j++) A[i][j]=parseFloat(document.getElementById(`A${i}${j}`).value)||0;
    b[i]=parseFloat(document.getElementById(`b${i}`).value)||0; }
  return {A,b};
}

// ---------- classify: unique / none / infinite (Gaussian elimination) ----------
function analyze(A,b){
  const eps=1e-9;
  const M=[[...A[0],b[0]],[...A[1],b[1]],[...A[2],b[2]]];
  let rank=0;
  for(let col=0; col<3 && rank<3; col++){
    let piv=-1,best=eps;
    for(let r=rank;r<3;r++){ if(Math.abs(M[r][col])>best){best=Math.abs(M[r][col]);piv=r;} }
    if(piv<0) continue;
    [M[rank],M[piv]]=[M[piv],M[rank]];
    for(let r=0;r<3;r++){ if(r!==rank){ const f=M[r][col]/M[rank][col];
      for(let c=col;c<4;c++) M[r][c]-=f*M[rank][c]; } }
    rank++;
  }
  let inconsistent=false;
  for(let r=0;r<3;r++){
    const zeroRow = Math.abs(M[r][0])<1e-7 && Math.abs(M[r][1])<1e-7 && Math.abs(M[r][2])<1e-7;
    if(zeroRow && Math.abs(M[r][3])>1e-7) inconsistent=true;
  }
  if(rank===3){
    // unique solution via Cramer's rule (clean for display)
    const det=det3(A);
    const sol=[0,1,2].map(k=>det3(replaceCol(A,b,k))/det);
    return {type:"one", sol, rank, det};
  }
  if(inconsistent) return {type:"none", rank};
  return {type:"inf", rank};
}
function det3(m){
  return m[0][0]*(m[1][1]*m[2][2]-m[1][2]*m[2][1])
        -m[0][1]*(m[1][0]*m[2][2]-m[1][2]*m[2][0])
        +m[0][2]*(m[1][0]*m[2][1]-m[1][1]*m[2][0]);
}
function replaceCol(A,b,k){ return A.map((row,i)=>row.map((v,j)=> j===k?b[i]:v)); }

// ---------- geometry helpers ----------
function linspace(a,bb,n){ const out=[]; for(let i=0;i<n;i++) out.push(a+(bb-a)*i/(n-1)); return out; }

function planeTrace(a1,a2,a3,d,R,scale){
  if(Math.abs(a1)+Math.abs(a2)+Math.abs(a3)<1e-12) return null; // not a plane
  const n=16, g=linspace(-R,R,n);
  const X=[],Y=[],Z=[];
  const big=Math.max(Math.abs(a1),Math.abs(a2),Math.abs(a3));
  for(let i=0;i<n;i++){ X.push([]); Y.push([]); Z.push([]);
    for(let j=0;j<n;j++){
      let x,y,z;
      if(Math.abs(a3)===big){ x=g[i]; y=g[j]; z=(d-a1*x-a2*y)/a3; }
      else if(Math.abs(a2)===big){ x=g[i]; z=g[j]; y=(d-a1*x-a3*z)/a2; }
      else { y=g[i]; z=g[j]; x=(d-a2*y-a3*z)/a1; }
      X[i].push(x); Y[i].push(y); Z[i].push(z);
    }
  }
  return {type:"surface",x:X,y:Y,z:Z,showscale:false,opacity:0.55,colorscale:scale};
}
function seg(p,q,color,width){ return {type:"scatter3d",mode:"lines",
  x:[p[0],q[0]],y:[p[1],q[1]],z:[p[2],q[2]],line:{color:color,width:width||7},showlegend:false}; }
function head(p,q,color){ return {type:"cone",x:[q[0]],y:[q[1]],z:[q[2]],
  u:[q[0]-p[0]],v:[q[1]-p[1]],w:[q[2]-p[2]],sizemode:"absolute",sizeref:0.4,
  showscale:false,colorscale:[[0,color],[1,color]]}; }

// ---------- plotting ----------
function plotAll(){
  const {A,b}=readSystem();
  const R=parseFloat(document.getElementById("rng").value)||4;
  const res=analyze(A,b);
  showStatus(A,b,res);

  // ROW picture
  const rowData=[];
  for(let i=0;i<3;i++){ const t=planeTrace(A[i][0],A[i][1],A[i][2],b[i],R,COLORS[i]); if(t) rowData.push(t); }
  if(res.type==="one"){
    rowData.push({type:"scatter3d",mode:"markers+text",x:[res.sol[0]],y:[res.sol[1]],z:[res.sol[2]],
      text:["  ("+res.sol.map(v=>round(v)).join(", ")+")"],textposition:"top center",
      marker:{size:7,color:"red"},showlegend:false});
  }
  const scene={xaxis:{title:"x"},yaxis:{title:"y"},zaxis:{title:"z"},aspectmode:"cube"};
  Plotly.newPlot("rowPlot",rowData,
    {title:"ROW picture — each equation is a plane",scene,margin:{l:0,r:0,t:34,b:0}},
    {responsive:true});

  // COLUMN picture
  const cols=[0,1,2].map(j=>[A[0][j],A[1][j],A[2][j]]);
  const colData=[];
  if(res.type==="one"){
    // tip-to-tail of x*col1, y*col2, z*col3  ->  b
    let run=[0,0,0];
    for(let j=0;j<3;j++){ const s=res.sol[j], v=cols[j].map(c=>c*s), start=[...run];
      run=run.map((r,k)=>r+v[k]); colData.push(seg(start,run,VEC[j],8)); colData.push(head(start,run,VEC[j])); }
    colData.push(seg([0,0,0],b,"red",6)); colData.push(head([0,0,0],b,"red"));
  } else {
    // columns from origin (coef 1) + b — see whether b lies in their span
    for(let j=0;j<3;j++){ colData.push(seg([0,0,0],cols[j],VEC[j],7)); colData.push(head([0,0,0],cols[j],VEC[j])); }
    colData.push(seg([0,0,0],b,"red",6)); colData.push(head([0,0,0],b,"red"));
  }
  Plotly.newPlot("colPlot",colData,
    {title:"COLUMN picture — combine the columns to reach b",scene,margin:{l:0,r:0,t:34,b:0}},
    {responsive:true});
}

function round(v){ const r=Math.round(v*1000)/1000; return Object.is(r,-0)?0:r; }

function showStatus(A,b,res){
  const s=document.getElementById("status");
  const eq=i=>`${A[i][0]}x + ${A[i][1]}y + ${A[i][2]}z = ${b[i]}`;
  let head="", body="";
  if(res.type==="one"){
    head=`<span class="tag one">ONE solution</span> &nbsp; det(A) = ${round(res.det)} ≠ 0, so A is invertible.`;
    body=`Solution &nbsp;<code>(x, y, z) = (${res.sol.map(round).join(", ")})</code>.<br>`+
         `<b>Row picture:</b> the three planes meet at this single red point.<br>`+
         `<b>Column picture:</b> taking <code>${round(res.sol[0])}</code> of col&nbsp;1, `+
         `<code>${round(res.sol[1])}</code> of col&nbsp;2, <code>${round(res.sol[2])}</code> of col&nbsp;3 `+
         `chains tip-to-tail exactly onto <code>b</code>.`;
  } else if(res.type==="none"){
    head=`<span class="tag none">NO solution</span> &nbsp; det(A) = 0 (A is singular), rank = ${res.rank}.`;
    body=`Elimination produces a row <code>0 = (nonzero)</code>: the planes share no common point, `+
         `and <code>b</code> lies <i>outside</i> the column space (the columns are dependent, spanning only a line/plane).`;
  } else {
    head=`<span class="tag inf">INFINITELY MANY solutions</span> &nbsp; det(A) = 0 (singular), rank = ${res.rank}.`;
    body=`The columns are dependent, but <code>b</code> <i>does</i> lie in their span. `+
         `The planes share a whole line (or plane) of solutions = one particular solution + the null space.`;
  }
  s.innerHTML = head + "<br>" + body;
}

buildGrid();
plotAll();
</script>
</body>
</html>
